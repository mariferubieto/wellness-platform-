services:
  - type: web
    name: wellness-platform-backend
    env: node
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: NEXT_PUBLIC_APP_URL
        sync: false
      - key: BACKEND_URL
        sync: false
      - key: MP_ACCESS_TOKEN
        sync: false
      - key: MP_WEBHOOK_SECRET
        sync: false
